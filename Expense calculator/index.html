<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income expense calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-300 p-6">

    <div class="max-w-4xl mx-auto bg-white p-22 rounded-xl">
        <h1 class="text-3xl text-center font-bold ">Income Expense calculator</h1>
        <div class="flex justify-around items-center mt-8">
            <div class="text-xl font-semibold">Total Income: ₹<span id="income">0</span></div>
            <div class="text-xl font-semibold">Total expense:₹<span id="expense">0</span></div>
            <div class="text-xl font-semibold">Balance:₹<span id="balance">0</span></div>
        </div>

        <div class="flex flex-col ">
            <input type="text" id="desc" placeholder="Enter Description here..." class="bg-blue-100 rounded p-2 mt-6" />
            <input type="number" id="amt" placeholder="Enter Amount here..." class="bg-blue-100 rounded p-2 mt-4" />

            <div class="mt-4">
                <input type="radio" name="type" value="income" class="" />Income
                <input type="radio" name="type" value="expense" />Expense
            </div>
            <div class="mt-4">
                <button onclick="addEntry()"
                    class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded text-white">Add</button>
                <button onclick="resetForm()"
                    class="bg-orange-600 hover:bg-orange-500 px-4 py-2 rounded text-white">Reset</button>
            </div>
        </div>

        <div class="mt-4">
            <input type="radio" name="filter" value="" />All
            <input type="radio" name="filter" value="" />Income
            <input type="radio" name="filter" value="" />Expense
        </div>

        <div class="mt-4">
            <div class="relative overflow-x-auto shadow-md rounded-lg border border-gray-300">
                <table class="w-full text-sm text-left text-gray-700">

                    <thead class="text-white bg-blue-600">
                        <tr>
                            <th class="px-6 py-3">Description</th>
                            <th class="px-6 py-3">Amount</th>
                            <th class="px-6 py-3">Type</th>
                            <th class="px-6 py-3">Action</th>
                        </tr>
                    </thead>

                    <tbody id="tbody">

                    </tbody>

                </table>
            </div>
        </div>

    </div>
    <script src="project.js"></script>
</body>

</html>
